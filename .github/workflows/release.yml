name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # The changesets action commits the version bump itself. Disable the husky
    # hooks for this job so the bot commit is not run through the local dev
    # commit-msg and pre-commit hooks; the commit message is set conventional
    # below regardless.
    env:
      HUSKY: '0'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset tag
          commit: 'chore: release version packages'
          title: 'chore: release version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # When a version was tagged, build and package both browsers and attach the
      # Chrome zip, the Firefox zip, and the Firefox sources zip to the release the
      # changesets action created for the tag. The tag is pushed with GITHUB_TOKEN,
      # so a separate tag triggered workflow would never fire; doing it here avoids
      # that and keeps the artifacts on the same run that produced the tag.
      - name: Build and package release artifacts
        if: steps.changesets.outputs.published == 'true'
        run: |
          pnpm wxt zip -b chrome
          pnpm wxt zip -b firefox
      - name: Attach artifacts to the GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          files=(
            ".output/kmitl-course-planner-${version}-chrome.zip"
            ".output/kmitl-course-planner-${version}-firefox.zip"
            ".output/kmitl-course-planner-${version}-sources.zip"
          )
          if gh release view "v${version}" >/dev/null 2>&1; then
            gh release upload "v${version}" "${files[@]}" --clobber
          else
            gh release create "v${version}" "${files[@]}" \
              --title "v${version}" \
              --notes "See CHANGELOG.md for the release notes."
          fi

  # Store publish jobs stay gated behind GitHub Environments with required
  # reviewers. They run only after a release is tagged and a reviewer approves,
  # and they read credentials that are configured as environment secrets before
  # the first listed release. See docs/STORE_LISTING.md.
  publish-chrome:
    name: publish-chrome
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    environment: chrome-web-store
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm wxt zip -b chrome
      - run: pnpm wxt submit --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  publish-firefox:
    name: publish-firefox
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    environment: amo
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm wxt zip -b firefox
      - run: pnpm wxt submit --firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
